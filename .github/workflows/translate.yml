name: Translate

on:
  push:
    branches: [main]
    paths:
      - 'deepdive/**/*.html'
      - 'deepdive/**/*-blog.md'
      - 'deepdive/**/*.meta.json'
      - 'config/glossary.json'
      - 'config/languages.json'
      - '.github/workflows/translate.yml'
  workflow_dispatch:
    inputs:
      slug:
        description: 'Optional: only translate this slug (e.g. white-collar). Empty = all stale.'
        required: false
        type: string
      provider:
        description: 'LLM provider for translation (default bigmodel/glm-5.1). Use "anthropic" for content-filter-blocked or oversized articles.'
        required: false
        type: choice
        default: 'bigmodel'
        options:
          - bigmodel
          - anthropic

permissions:
  contents: write

concurrency:
  group: translate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[auto-translate]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run translation
        id: translate
        env:
          TRANSLATE_PROVIDER: ${{ inputs.provider || 'bigmodel' }}
          BIGMODEL_API_KEY: ${{ secrets.BIGMODEL_API_KEY }}
          BIGMODEL_API_ENDPOINT: 'https://api.z.ai/api/paas/v4/chat/completions'
          BIGMODEL_MODEL: 'glm-5.1'
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRANSLATE_FORCE_SLUG: ${{ inputs.slug || '' }}
        run: |
          set -e
          python scripts/translate.py | tee translate.log
          # Extract last JSON line as summary
          tail -n 1 translate.log > summary.json
          echo "summary=$(cat summary.json)" >> $GITHUB_OUTPUT

      - name: Commit translations
        id: commit
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only consider changes in deepdive/ — ignore summary.json / translate.log
          if [[ -z $(git status --porcelain deepdive/) ]]; then
            echo "No deepdive translation changes."
            echo "committed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git add deepdive/
          FILES=$(git diff --cached --name-only | head -20 | sed 's/^/  - /')
          git commit -m "[auto-translate] GLM-5.1 translations" -m "$FILES" -m "Generated by .github/workflows/translate.yml"
          # Rebase on remote to handle concurrent auto-translate commits from
          # parallel single-article runs.
          for attempt in 1 2 3; do
            if git push; then
              echo "committed=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Push rejected (attempt $attempt); rebasing on remote..."
            git pull --rebase --autostash origin main
          done
          echo "Failed to push after 3 rebase attempts" >&2
          exit 1

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          STATUS: ${{ job.status }}
          COMMITTED: ${{ steps.commit.outputs.committed }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python <<'PY' | python scripts/notify_slack.py
          import json, os, pathlib

          status = os.environ.get("STATUS", "")
          committed = os.environ.get("COMMITTED", "")
          run_url = os.environ.get("RUN_URL", "")

          summary_path = pathlib.Path("summary.json")
          summary = {}
          if summary_path.exists():
              try:
                  summary = json.loads(summary_path.read_text())
              except Exception:
                  pass

          files = summary.get("translated_files", [])
          model = summary.get("model", "glm-5.1")

          if status == "success" and committed == "true":
              color = "good"
              title = f"✅ Translation completed · {len(files)} 个文件"
              text = f"GLM-5.1 ({model}) 翻译已自动合并到 main，Pages + Cloudflare 即将同步上线。"
          elif status == "success":
              color = "#888888"
              title = "ℹ️ Translation · 无需更新"
              text = "所有文章的目标语言版本已是最新。"
          else:
              color = "danger"
              title = "❌ Translation 失败"
              text = "GLM-5.1 翻译执行失败，请查看日志。"

          fields = []
          if files:
              fields.append({
                  "title": "翻译文件",
                  "value": "\n".join(f"• {f}" for f in files[:20]),
                  "short": False,
              })
          fields.append({
              "title": "Workflow",
              "value": f"<{run_url}|查看运行日志>",
              "short": True,
          })

          print(json.dumps({
              "text": title,
              "attachments": [{
                  "color": color,
                  "title": title,
                  "text": text,
                  "fields": fields,
                  "mrkdwn_in": ["text", "fields"],
              }],
          }, ensure_ascii=False))
          PY

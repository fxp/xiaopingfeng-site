<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Markdown Viewer · AI Buzzwords</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.6.1/github-markdown.min.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github.min.css" media="(prefers-color-scheme: light)" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github-dark.min.css" media="(prefers-color-scheme: dark)" />
<style>
  :root {
    color-scheme: light dark;
    --bg: #ffffff;
    --fg: #1f2328;
    --muted: #59636e;
    --border: #d1d9e0;
    --sidebar-bg: #f6f8fa;
    --sidebar-w: 280px;
    --content-max: 860px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117;
      --fg: #e6edf3;
      --muted: #9198a1;
      --border: #30363d;
      --sidebar-bg: #161b22;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg);
               font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
  .layout { display: grid; grid-template-columns: var(--sidebar-w) 1fr; min-height: 100vh; }
  aside.sidebar {
    background: var(--sidebar-bg); border-right: 1px solid var(--border);
    padding: 1.5rem 1.25rem; overflow-y: auto; position: sticky; top: 0; height: 100vh;
  }
  aside.sidebar .breadcrumb { font-size: 0.8rem; color: var(--muted); margin-bottom: 1rem;
                              display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center; }
  aside.sidebar .breadcrumb a { color: inherit; text-decoration: none; border-bottom: 1px dotted var(--muted); }
  aside.sidebar .breadcrumb a:hover { color: var(--fg); }
  aside.sidebar h2 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em;
                     color: var(--muted); font-weight: 600; margin: 1.5rem 0 0.5rem; }
  aside.sidebar h2:first-of-type { margin-top: 0; }
  aside.sidebar nav.toc ul { list-style: none; padding: 0; margin: 0; font-size: 0.875rem; line-height: 1.5; }
  aside.sidebar nav.toc li { margin: 0.15rem 0; }
  aside.sidebar nav.toc a { color: var(--muted); text-decoration: none; display: block;
                            padding: 0.15rem 0.5rem; border-left: 2px solid transparent;
                            border-radius: 0 4px 4px 0; transition: all 0.15s; }
  aside.sidebar nav.toc a:hover { color: var(--fg); background: rgba(127,127,127,0.08); }
  aside.sidebar nav.toc a.active { color: var(--fg); border-left-color: #0969da; background: rgba(9,105,218,0.08); }
  aside.sidebar nav.toc .lvl-2 { padding-left: 0; }
  aside.sidebar nav.toc .lvl-3 { padding-left: 1rem; }
  aside.sidebar nav.toc .lvl-4 { padding-left: 2rem; font-size: 0.8rem; }
  aside.sidebar .meta { font-size: 0.75rem; color: var(--muted); margin-top: 1.5rem;
                        padding-top: 1rem; border-top: 1px solid var(--border); }
  aside.sidebar .meta a { color: inherit; }

  main.content { padding: 3rem clamp(1.5rem, 5vw, 4rem); overflow-x: hidden; }
  main.content .markdown-body { background: transparent !important; max-width: var(--content-max);
                                 margin: 0 auto; font-size: 16px; }
  main.content .empty { max-width: var(--content-max); margin: 0 auto; color: var(--muted); }
  main.content .empty code { background: var(--sidebar-bg); padding: 0.1rem 0.4rem; border-radius: 4px; }
  main.content .error { max-width: var(--content-max); margin: 0 auto; padding: 1rem 1.25rem;
                        border: 1px solid #d1242f33; background: #d1242f0d; border-radius: 6px;
                        color: #d1242f; }
  .toggle-sidebar { display: none; position: fixed; top: 0.75rem; left: 0.75rem; z-index: 10;
                    background: var(--sidebar-bg); border: 1px solid var(--border);
                    border-radius: 6px; padding: 0.5rem 0.75rem; cursor: pointer; color: var(--fg);
                    font-size: 0.875rem; }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    aside.sidebar { position: fixed; top: 0; left: 0; width: 85%; max-width: 320px;
                    z-index: 9; transform: translateX(-100%); transition: transform 0.2s;
                    box-shadow: 0 0 30px rgba(0,0,0,0.3); }
    aside.sidebar.open { transform: translateX(0); }
    .toggle-sidebar { display: block; }
    main.content { padding: 3.5rem 1rem 2rem; }
  }
</style>
</head>
<body>
<button class="toggle-sidebar" id="toggleSidebar" aria-label="Toggle navigation">☰ 目录</button>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="breadcrumb" id="breadcrumb"><a href="./">AI Buzzwords</a></div>
    <h2>目录</h2>
    <nav class="toc" id="toc"><p style="font-size:0.85rem;color:var(--muted)">加载中…</p></nav>
    <div class="meta" id="meta"></div>
  </aside>
  <main class="content">
    <article class="markdown-body" id="article"></article>
    <div class="empty" id="empty" hidden>
      <h2>Markdown Viewer</h2>
      <p>用法： <code>viewer.html?f=path/to/file.md</code></p>
      <p>例如： <a href="?f=deepdive/neolab/report.md">?f=deepdive/neolab/report.md</a></p>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@14.1.4/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>
<script>
(function () {
  'use strict';

  const params = new URLSearchParams(location.search);
  const filePath = params.get('f') || params.get('file');

  const $article = document.getElementById('article');
  const $empty = document.getElementById('empty');
  const $toc = document.getElementById('toc');
  const $meta = document.getElementById('meta');
  const $breadcrumb = document.getElementById('breadcrumb');
  const $sidebar = document.getElementById('sidebar');
  document.getElementById('toggleSidebar').onclick = () => $sidebar.classList.toggle('open');

  if (!filePath) {
    $empty.hidden = false;
    $toc.innerHTML = '<p style="font-size:0.85rem;color:var(--muted)">未指定文件</p>';
    return;
  }

  // Security: only allow relative paths within the same origin, no protocol or `..`
  if (/^[a-z]+:|^\/\/|\.\.(\/|$)/i.test(filePath)) {
    showError('非法路径：仅允许同源相对路径。');
    return;
  }

  // Configure marked (gfm is on by default in v14)
  marked.setOptions({ gfm: true, breaks: false });

  // Build breadcrumb
  const parts = filePath.split('/');
  const crumbs = ['<a href="./">AI Buzzwords</a>'];
  for (let i = 0; i < parts.length - 1; i++) {
    crumbs.push('<span>/</span>');
    const path = parts.slice(0, i + 1).join('/') + '/';
    crumbs.push(`<a href="${escapeAttr(path)}">${escapeHtml(parts[i])}</a>`);
  }
  crumbs.push('<span>/</span>');
  crumbs.push(`<span>${escapeHtml(parts[parts.length - 1])}</span>`);
  $breadcrumb.innerHTML = crumbs.join(' ');

  document.title = parts[parts.length - 1] + ' · AI Buzzwords';

  fetch(filePath, { cache: 'no-cache' })
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status} — 找不到文件 "${filePath}"`);
      return r.text();
    })
    .then(md => render(md))
    .catch(err => showError(err.message));

  function render(md) {
    // Resolve relative links/images against the markdown file's directory.
    // Use walkTokens to rewrite hrefs in-place — avoids overriding the renderer,
    // which breaks `this.parser.parseInline` binding in marked v14.
    const baseDir = filePath.includes('/') ? filePath.substring(0, filePath.lastIndexOf('/') + 1) : '';
    const html = marked.parse(md, {
      walkTokens: (token) => {
        if (token.type === 'link') {
          const resolved = resolveRelative(token.href, baseDir);
          token.href = /\.md(#.*)?$/i.test(resolved) && !/^[a-z]+:/i.test(resolved)
            ? `?f=${encodeURIComponent(resolved.replace(/#.*$/, ''))}${(resolved.match(/#.*$/) || [''])[0]}`
            : resolved;
        } else if (token.type === 'image') {
          token.href = resolveRelative(token.href, baseDir);
        }
      }
    });
    $article.innerHTML = html;

    // Highlight code blocks (skip silently if hljs failed to load)
    if (typeof hljs !== 'undefined') {
      $article.querySelectorAll('pre code').forEach(block => {
        try { hljs.highlightElement(block); } catch (e) {}
      });
    }

    // Auto-add ids to headings for TOC anchoring
    $article.querySelectorAll('h1, h2, h3, h4, h5, h6').forEach(h => {
      if (!h.id) h.id = slugify(h.textContent);
    });

    buildToc();
    buildMeta(md);
    setupScrollSpy();

    // Scroll to fragment if present
    if (location.hash) {
      const el = document.getElementById(location.hash.slice(1));
      if (el) el.scrollIntoView();
    }
  }

  function buildToc() {
    const headings = $article.querySelectorAll('h2, h3, h4');
    if (headings.length === 0) {
      $toc.innerHTML = '<p style="font-size:0.85rem;color:var(--muted)">本文无标题</p>';
      return;
    }
    const ul = document.createElement('ul');
    headings.forEach(h => {
      if (!h.id) h.id = slugify(h.textContent);
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = '#' + h.id;
      a.textContent = h.textContent;
      a.className = 'lvl-' + h.tagName.charAt(1);
      a.dataset.target = h.id;
      li.appendChild(a);
      ul.appendChild(li);
    });
    $toc.innerHTML = '';
    $toc.appendChild(ul);
  }

  function buildMeta(md) {
    const words = md.replace(/```[\s\S]*?```/g, '').replace(/[#*>`_\-\[\]()]/g, '').trim();
    const cn = (words.match(/[一-龥]/g) || []).length;
    const en = (words.match(/[a-zA-Z]+/g) || []).length;
    const minutes = Math.max(1, Math.round((cn / 400 + en / 250)));
    $meta.innerHTML = `
      <div>约 ${cn.toLocaleString()} 中文字 · ${en.toLocaleString()} 英文词</div>
      <div>预计阅读 ${minutes} 分钟</div>
      <div style="margin-top:0.5rem"><a href="${escapeAttr(filePath)}">查看源文件</a></div>
    `;
  }

  function setupScrollSpy() {
    const links = $toc.querySelectorAll('a[data-target]');
    if (links.length === 0) return;
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          links.forEach(l => l.classList.toggle('active', l.dataset.target === entry.target.id));
        }
      });
    }, { rootMargin: '-20% 0px -70% 0px' });
    $article.querySelectorAll('h2, h3, h4').forEach(h => observer.observe(h));
  }

  function resolveRelative(href, baseDir) {
    if (!href) return href;
    if (/^([a-z]+:|\/\/|#|\/)/i.test(href)) return href;
    return baseDir + href;
  }

  function slugify(s) {
    return s.toLowerCase().trim()
      .replace(/[^\w一-龥\- ]+/g, '')
      .replace(/\s+/g, '-');
  }

  function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
  function escapeAttr(s) { return escapeHtml(s); }

  function showError(msg) {
    $article.innerHTML = `<div class="error">⚠ ${escapeHtml(msg)}</div>`;
    $toc.innerHTML = '<p style="font-size:0.85rem;color:var(--muted)">—</p>';
  }
})();
</script>
</body>
</html>

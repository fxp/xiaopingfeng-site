<!DOCTYPE html>
<!--
  ────────────────────────────────────────────────────────────────
  AI-Buzzwords Article Template · v1
  ────────────────────────────────────────────────────────────────
  Replace placeholders {{...}} when authoring a new article.

  Required placeholders:
    {{LANG}}              html lang attribute, e.g. "zh", "zh-CN", "en"
    {{TITLE}}             <title> tag content
    {{ACCENT}}            primary accent color: red | amber | mint | signal
                          (mapped to themed Tailwind 'accent' below)
    {{TOPIC_LABEL}}       e.g. "[ECONOMY] · 白领工作终局"
    {{SLUG}}              article slug, e.g. "white-collar"
    {{NAV_PILL_HREF}}     OPTIONAL — secondary nav link href (e.g. dimension-map.html)
    {{NAV_PILL_LABEL}}    OPTIONAL — secondary nav label (e.g. "L3-1 · 劳动市场 / 入口")
    {{VERSION_LABEL}}     e.g. "v2 · 2026 · MAY 05"
    {{HERO_EYEBROW}}      small uppercase intro line above h1
    {{HERO_TITLE_HTML}}   h1 inner HTML (can include <em>, <span>, <br>)
    {{HERO_SUB}}          paragraph below h1
    {{TLDR_HTML}}         OPTIONAL — TL;DR block content (keep <ul> + insight box)
    {{BODY}}              all sections + pull-quotes + footer columns
    {{HREFLANG_BLOCK}}    auto-generated by inject_lang_switcher.py post-processing

  Theme palette (set ACCENT to one of):
    red    — #e84040  alarming/urgent topics (labor, military, leaks)
    signal — #d1402c  alarming variant
    amber  — #f5a524  analytical/historical (Cybertonia, NeoLab)
    mint   — #7fb88b  research/discovery (Emotion Vectors, Project DEAL)
  ────────────────────────────────────────────────────────────────
-->
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{TITLE}}</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,700&family=JetBrains+Mono:wght@300;400;500;700&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet" />

<!-- Tailwind via CDN with shared theme tokens -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
/* Theme palette — accent color picked per article, others available everywhere */
const ACCENTS = {
  red:    { hex:'#e84040', soft:'rgba(232,64,64,0.10)', glow:'rgba(232,64,64,0.30)' },
  signal: { hex:'#d1402c', soft:'rgba(209,64,44,0.10)', glow:'rgba(209,64,44,0.28)' },
  amber:  { hex:'#f5a524', soft:'rgba(245,165,36,0.10)', glow:'rgba(245,165,36,0.28)' },
  mint:   { hex:'#7fb88b', soft:'rgba(127,184,139,0.12)', glow:'rgba(127,184,139,0.28)' },
};
const A = ACCENTS["{{ACCENT}}"] || ACCENTS.red;
tailwind.config = {
  theme: {
    extend: {
      colors: {
        bg:          '#0c0a07',
        'bg-2':      '#161310',
        'bg-3':      '#1e1a15',
        fg:          '#f0ebe0',
        'fg-dim':    '#a09888',
        'fg-mute':   '#6a6058',
        line:        'rgba(240,235,224,0.10)',
        'line-bright':'rgba(240,235,224,0.18)',
        accent:      A.hex,
        'accent-soft': A.soft,
        'accent-glow': A.glow,
        red:    '#e84040', 'red-soft':   'rgba(232,64,64,0.10)',
        signal: '#d1402c', 'signal-soft':'rgba(209,64,44,0.10)',
        amber:  '#f5a524', 'amber-soft': 'rgba(245,165,36,0.10)',
        mint:   '#7fb88b', 'mint-soft':  'rgba(127,184,139,0.12)',
      },
      fontFamily: {
        serif: ["'Fraunces'", "'Source Han Serif SC'", "'Noto Serif SC'", "Georgia", "serif"],
        mono:  ["'JetBrains Mono'", "ui-monospace", "monospace"],
        sans:  ["'Inter Tight'", "system-ui", "sans-serif"],
      },
      maxWidth: { prose:'820px', content:'1020px', wrap:'1320px' },
    }
  }
};
</script>

<style>
em, i { font-style: normal }
body { font-feature-settings:'ss01','ss02','kern'; -webkit-font-smoothing: antialiased }

/* Subtle grid texture */
body::before {
  content:''; position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(240,235,224,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(240,235,224,0.025) 1px, transparent 1px);
  background-size:60px 60px; pointer-events:none; z-index:0;
}

/* Pulsing lamp — uses accent via CSS variable, set by JS below */
.lamp { display:inline-block; width:6px; height:6px; border-radius:50%;
  background:var(--accent); box-shadow:0 0 8px var(--accent), 0 0 20px var(--accent-glow);
  animation:pulse 2.4s ease-in-out infinite; vertical-align:middle; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.cursor::after { content:'▋'; animation:blink 1.1s step-end infinite;
  margin-left:2px; color:var(--accent); font-size:0.7em; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

@keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
.hero-anim > * { animation:fadeUp 0.7s ease both; }
.hero-anim > *:nth-child(1){animation-delay:0.05s}
.hero-anim > *:nth-child(2){animation-delay:0.15s}
.hero-anim > *:nth-child(3){animation-delay:0.25s}
.hero-anim > *:nth-child(4){animation-delay:0.35s}

/* Pull-quote */
.pullquote-mark::before { content:'"'; font-family:'Fraunces',Georgia,serif;
  font-size:6rem; line-height:0.8; color:var(--accent); opacity:0.25;
  position:absolute; top:-8px; left:-12px; }

/* Synthesis label decoration */
.synthesis-label::before { content:'SYNTHESIS / 综合判断'; display:block;
  font-family:'JetBrains Mono',monospace; font-size:9px;
  letter-spacing:0.2em; color:var(--accent); margin-bottom:12px; text-transform:uppercase; }

/* Citation underline */
a.cite { color:inherit; text-decoration:underline; text-decoration-style:dotted;
  text-underline-offset:3px; text-decoration-color:var(--accent-glow); transition:color 0.15s; }
a.cite:hover { color:var(--accent); }
a.cite-mint { color:inherit; text-decoration:underline; text-decoration-style:dotted;
  text-underline-offset:3px; text-decoration-color:rgba(127,184,139,0.5); transition:color 0.15s; }
a.cite-mint:hover { color:#7fb88b; }
</style>

<!-- Bind --accent CSS variable from chosen theme -->
<script>
document.documentElement.style.setProperty('--accent',
  ({red:'#e84040', signal:'#d1402c', amber:'#f5a524', mint:'#7fb88b'})["{{ACCENT}}"] || '#e84040');
document.documentElement.style.setProperty('--accent-glow',
  ({red:'rgba(232,64,64,0.30)', signal:'rgba(209,64,44,0.28)', amber:'rgba(245,165,36,0.28)', mint:'rgba(127,184,139,0.28)'})["{{ACCENT}}"] || 'rgba(232,64,64,0.30)');
</script>

<!-- Lang switcher + hreflang (auto-managed by inject_lang_switcher.py) -->
<script src="../../lang-switcher.js" defer></script>
{{HREFLANG_BLOCK}}
</head>

<body class="bg-bg text-fg font-serif leading-relaxed overflow-x-hidden" data-theme="{{ACCENT}}">

<!-- ═══════════════════ TOP STRIP (unified) ═══════════════════ -->
<div class="relative z-[2] border-b border-line">
  <div class="max-w-wrap mx-auto px-[5vw] lg:px-12 py-3 flex items-center gap-4 flex-wrap">
    <span class="lamp mr-1"></span>
    <span class="font-mono text-[9px] lg:text-[10px] tracking-[0.22em] uppercase text-accent">DEEPDIVE</span>
    <span class="text-line-bright font-mono text-[10px]">/</span>
    <span class="font-mono text-[9px] lg:text-[10px] tracking-[0.18em] uppercase text-fg-mute">{{TOPIC_LABEL}}</span>
    <!-- OPTIONAL secondary nav pill -->
    <a href="{{NAV_PILL_HREF}}" class="font-mono text-[9px] lg:text-[10px] tracking-[0.18em] uppercase text-fg-mute hover:text-accent border border-line-bright px-2 py-0.5 transition-colors">{{NAV_PILL_LABEL}}</a>
    <!-- Lang switcher pushed to right -->
    <div data-lang-switcher data-slug="{{SLUG}}" style="margin-left:auto"></div>
    <span class="flex-1 h-px bg-line hidden lg:block"></span>
    <span class="font-mono text-[9px] tracking-[0.14em] text-fg-mute">{{VERSION_LABEL}}</span>
  </div>
</div>

<!-- ═══════════════════ HERO ═══════════════════ -->
<section class="hero-anim max-w-wrap mx-auto px-[5vw] lg:px-12 relative z-[2] pt-10 lg:pt-24 pb-12 lg:pb-20 border-b border-line">
  <div class="font-mono text-[9px] lg:text-[11px] tracking-[0.18em] uppercase text-accent mb-8 lg:mb-10">
    {{HERO_EYEBROW}}
  </div>
  <h1 class="font-serif font-light text-[clamp(32px,8vw,108px)] leading-[1.0] tracking-tight mb-6 lg:mb-9 max-w-content">
    {{HERO_TITLE_HTML}}
  </h1>
  <p class="max-w-prose text-[15px] lg:text-xl text-fg-dim font-light leading-relaxed">
    {{HERO_SUB}}
  </p>
</section>

<!-- ═══════════════════ TL;DR (optional, recommended) ═══════════════════ -->
{{TLDR_HTML}}

<!-- ═══════════════════ BODY (sections + pull-quotes + footer) ═══════════════════ -->
{{BODY}}

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NEO LAB № 01 / BANNER</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,700&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        bg: 'var(--bg)', 'bg-2': 'var(--bg-2)',
        fg: 'var(--fg)', 'fg-dim': 'var(--fg-dim)', 'fg-mute': 'var(--fg-mute)',
        line: 'var(--line)', 'line-bright': 'var(--line-bright)',
        amber: 'var(--amber)', 'amber-soft': 'var(--accent-soft)', 'amber-glow': 'var(--accent-glow)',
        mint: 'var(--mint)',
      },
      fontFamily: {
        serif: ["'Fraunces'","'Source Han Serif SC'","'Noto Serif SC'","Georgia","serif"],
        mono: ["'JetBrains Mono'","ui-monospace","monospace"],
      },
    }
  }
}
</script>
<style>
em, i { font-style: normal }
body { font-feature-settings: 'ss01','ss02','kern'; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; background: #0a0908 }

/* Grid texture */
.grid-bg::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(245,165,36,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,165,36,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

/* Noise */
.noise::after {
  content: '';
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.96 0 0 0 0 0.9 0 0 0 0 0.8 0 0 0 0.06 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
  opacity: 0.5;
  mix-blend-mode: overlay;
}

/* Lamp */
.lamp {
  width: 10px; height: 10px; border-radius: 50%;
  background: #f5a524;
  box-shadow: 0 0 12px #f5a524, 0 0 30px rgba(245,165,36,0.25);
  animation: pulse 2.4s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

/* Andon rope - vertical amber line with glow */
.andon-rope {
  width: 2px;
  background: linear-gradient(180deg, transparent 0%, #f5a524 20%, #f5a524 80%, transparent 100%);
  box-shadow: 0 0 12px rgba(245,165,36,0.3);
}

/* Stat number shimmer */
@keyframes countUp {
  from { opacity: 0; transform: translateY(8px) }
  to { opacity: 1; transform: translateY(0) }
}
.stat-anim { animation: countUp 0.8s cubic-bezier(.2,.7,.2,1) both }
.stat-anim:nth-child(1) { animation-delay: 0.1s }
.stat-anim:nth-child(2) { animation-delay: 0.2s }
.stat-anim:nth-child(3) { animation-delay: 0.3s }
.stat-anim:nth-child(4) { animation-delay: 0.4s }
</style>
</head>

<body class="bg-bg text-fg font-serif">

<!-- 16:9 Container -->
<div class="grid-bg noise relative w-full overflow-hidden" style="aspect-ratio: 16/9; max-height: 100vh">

  <!-- Andon rope — left side vertical accent -->
  <div class="andon-rope absolute left-[7%] top-0 bottom-0 z-10 hidden lg:block"></div>

  <!-- Content layer -->
  <div class="relative z-20 h-full flex flex-col justify-between px-[5%] lg:px-[9%] py-[4%] lg:py-[5%]">

    <!-- TOP ROW: series tag + stats -->
    <div class="flex justify-between items-start">
      <!-- Series tag -->
      <div class="flex items-center gap-3">
        <div class="lamp shrink-0"></div>
        <div class="font-mono text-[9px] lg:text-[11px] tracking-[0.22em] uppercase text-amber">
          NEO LAB / FIELD REPORTS · № 01
        </div>
      </div>
      <!-- Mini stats row -->
      <div class="hidden lg:flex gap-8 font-mono text-[10px] tracking-[0.14em] text-fg-mute uppercase">
        <div class="stat-anim text-center">
          <div class="text-xl font-serif text-amber leading-none mb-1">11</div>
          <div>作品</div>
        </div>
        <div class="stat-anim text-center">
          <div class="text-xl font-serif text-amber leading-none mb-1">4</div>
          <div>论文</div>
        </div>
        <div class="stat-anim text-center">
          <div class="text-xl font-serif text-amber leading-none mb-1">3</div>
          <div>实体业务</div>
        </div>
        <div class="stat-anim text-center">
          <div class="text-xl font-serif text-amber leading-none mb-1">7</div>
          <div>判断</div>
        </div>
      </div>
    </div>

    <!-- MIDDLE: Main title -->
    <div class="flex-1 flex flex-col justify-center max-w-[85%] lg:max-w-[70%]">
      <h1 class="font-serif font-light text-[clamp(24px,5.5vw,96px)] leading-[0.92] tracking-tight mb-4 lg:mb-6">
        当 AI 开始<br/>
        <em class="text-amber font-normal">"打工"</em>
      </h1>
      <p class="font-serif font-light text-[clamp(14px,2vw,28px)] leading-snug text-fg-dim max-w-[600px]">
        Andon Labs 与自主组织的前夜<br/>
        <span class="text-fg-mute text-[0.85em]">——一家把真实的钱、合同、租约交给 AI 的实验室</span>
      </p>
    </div>

    <!-- BOTTOM ROW: key facts strip -->
    <div class="flex flex-col lg:flex-row justify-between items-end gap-4">

      <!-- Left: milestone timeline compressed -->
      <div class="flex gap-4 lg:gap-6 items-end">
        <div class="text-center">
          <div class="font-mono text-[8px] lg:text-[9px] text-amber tracking-[0.16em] uppercase mb-1">2024.12</div>
          <div class="font-serif text-[11px] lg:text-sm text-fg leading-tight">Deepfake<br/>论文</div>
        </div>
        <div class="w-px h-8 bg-line-bright hidden lg:block"></div>
        <div class="text-center">
          <div class="font-mono text-[8px] lg:text-[9px] text-amber tracking-[0.16em] uppercase mb-1">2025.02</div>
          <div class="font-serif text-[11px] lg:text-sm text-fg leading-tight">Vending<br/>-Bench</div>
        </div>
        <div class="w-px h-8 bg-line-bright hidden lg:block"></div>
        <div class="text-center">
          <div class="font-mono text-[8px] lg:text-[9px] text-amber tracking-[0.16em] uppercase mb-1">2025.08</div>
          <div class="font-serif text-[11px] lg:text-sm text-fg leading-tight">Safety<br/>Report</div>
        </div>
        <div class="w-px h-8 bg-line-bright hidden lg:block"></div>
        <div class="text-center">
          <div class="font-mono text-[8px] lg:text-[9px] text-amber tracking-[0.16em] uppercase mb-1">2026.04</div>
          <div class="font-serif text-[11px] lg:text-sm text-fg leading-tight">Luna<br/>+ Mona</div>
        </div>
      </div>

      <!-- Right: the money shot quote -->
      <div class="max-w-[400px] text-right">
        <p class="font-serif text-[clamp(11px,1.4vw,18px)] text-fg-dim font-light leading-snug">
          "Safety from humans in the loop<br/>
          <em class="text-amber font-normal">is a mirage.</em>"
        </p>
        <div class="font-mono text-[8px] lg:text-[9px] text-fg-mute tracking-[0.16em] uppercase mt-2">
          9 人 · YC W24 · SF + STOCKHOLM
        </div>
      </div>

    </div>

  </div>

  <!-- Decorative: large faded "安灯" character -->
  <div class="absolute right-[5%] top-1/2 -translate-y-1/2 font-serif text-[clamp(120px,18vw,320px)] leading-none text-amber opacity-[0.04] pointer-events-none select-none z-10 hidden lg:block" style="font-weight:300">
    灯
  </div>

  <!-- Decorative: corner markers -->
  <div class="absolute top-[4%] left-[4%] w-4 h-4 border-t border-l border-amber opacity-30 z-10"></div>
  <div class="absolute top-[4%] right-[4%] w-4 h-4 border-t border-r border-amber opacity-30 z-10"></div>
  <div class="absolute bottom-[4%] left-[4%] w-4 h-4 border-b border-l border-amber opacity-30 z-10"></div>
  <div class="absolute bottom-[4%] right-[4%] w-4 h-4 border-b border-r border-amber opacity-30 z-10"></div>

</div>

</body>
</html>

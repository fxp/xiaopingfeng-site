<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#F5F1E8">
<title>Apps · 在线工具 — xiaopingfeng.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F5F1E8;
    --paper-dark: #E8E2D3;
    --ink: #1A1714;
    --ink-soft: #4A4540;
    --ink-faint: #8A8278;
    --accent: #C44536;
    --line: #D4CCB8;
    --serif: 'Noto Serif SC', serif;
    --sans: 'Noto Sans SC', 'PingFang SC', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--paper); color: var(--ink); line-height: 1.6; }
  .wrap { max-width: 560px; margin: 0 auto; padding: 64px 28px 64px; min-height: 100vh; display: flex; flex-direction: column; }
  .meta { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); letter-spacing: 0.12em; text-transform: uppercase; border-bottom: 1px solid var(--line); padding-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  .meta a { color: var(--ink-faint); text-decoration: none; }
  .meta a:hover { color: var(--accent); }
  h1 { font-family: var(--serif); font-weight: 900; font-size: 36px; line-height: 1.1; margin: 48px 0 12px; letter-spacing: -0.02em; }
  .lede { font-family: var(--serif); font-size: 15px; line-height: 1.75; color: var(--ink-soft); margin: 0 0 40px; }
  .section-label { font-family: var(--mono); font-size: 10px; color: var(--accent); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 14px; }
  .app-card { display: block; text-decoration: none; color: inherit; padding: 20px 22px; background: var(--paper-dark); border-left: 3px solid var(--accent); margin-bottom: 12px; transition: transform 0.15s ease; }
  .app-card:hover { transform: translateX(4px); }
  .app-card-title { font-family: var(--serif); font-size: 20px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
  .app-card-meta { font-family: var(--mono); font-size: 10px; color: var(--ink-faint); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
  .app-card-desc { font-family: var(--serif); font-size: 13px; line-height: 1.65; color: var(--ink-soft); margin-bottom: 10px; }
  .app-card-arrow { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.1em; }
  footer { margin-top: auto; padding-top: 32px; border-top: 1px solid var(--line); font-family: var(--mono); font-size: 11px; color: var(--ink-faint); letter-spacing: 0.08em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="wrap">
  <div class="meta">
    <a href="/">← xiaopingfeng.com</a>
    <span>Apps</span>
  </div>

  <h1>在线工具</h1>
  <p class="lede">一组实验性的在线工具。从心理测量到 AI 应用，每个工具都是一个具体问题的最小答案。</p>

  <div class="section-label">— 当前 —</div>

  <a class="app-card" href="/apps/abap-bench/">
    <div class="app-card-title">ABAP-Bench</div>
    <div class="app-card-meta">v2.0 · AI 评测 · 12 个模型</div>
    <div class="app-card-desc">给 AI 出一张 SAP 顾问资格考试卷。测评大模型在 ABAP 代码迁移、SAP 业务逻辑理解上的实际能力，附完整排行榜。</div>
    <div class="app-card-arrow">查看评测 →</div>
  </a>

  <a class="app-card" href="/apps/distance/">
    <div class="app-card-title">距离测试</div>
    <div class="app-card-meta">v0.1 · 心理测量 · 约 5 分钟</div>
    <div class="app-card-desc">基于厕所空间选择的多情境心理测量工具——用博弈论复盘 + Gerlach (2018) 四类型框架替代 MBTI。8 个情境场景。</div>
    <div class="app-card-arrow">开始测试 →</div>
  </a>

  <footer>fxp007 · 2026</footer>
</div>
</body>
</html>
